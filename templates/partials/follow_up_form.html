{# Create/edit form for follow_up_tasks. `f` may be {} for new. #}
<form
  class="entity-form"
  {% if is_new %}
    hx-post="/follow-ups"
  {% else %}
    hx-post="/follow-ups/{{ f.uuid }}"
  {% endif %}
  hx-swap="none"
>
  <h2>{{ 'New follow-up' if is_new else 'Edit follow-up' }}</h2>

  <label>
    Trigger task (name of the task that spawns this)
    <input type="text" name="trigger_task" required value="{{ f.trigger_task or '' }}">
  </label>

  <label>
    Follow-up task
    <input type="text" name="follow_up_task" required value="{{ f.follow_up_task or '' }}">
  </label>

  <div class="form-row">
    <label>
      Category
      <input type="text" name="catagory" value="{{ f.catagory or '' }}">
    </label>
    <label>
      Group
      <input type="text" name="task_group" value="{{ f.task_group or '' }}">
    </label>
    <label>
      Sub-group
      <input type="text" name="subgroup" value="{{ f.subgroup or '' }}">
    </label>
  </div>

  <div class="form-row">
    <label class="grow">
      Relevant link
      <input type="url" name="relevant_link" value="{{ f.relevant_link or '' }}" placeholder="https://…">
    </label>
    <label>
      Priority
      <input type="number" name="priority" min="0" max="10" value="{{ f.priority if f.priority is not none else 0 }}">
    </label>
  </div>

  <div class="form-row">
    <label>
      Est. hours
      <input type="number" step="0.25" min="0" name="estimated_time" value="{{ f.estimated_time or '' }}">
    </label>
    <label>
      Due offset (days from trigger)
      <input type="number" name="due_offset_days" value="{{ f.due_offset_days if f.due_offset_days is not none else '' }}">
    </label>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-ghost" data-close-modal>Cancel</button>
    <button type="submit" class="btn btn-primary">{{ 'Create' if is_new else 'Save' }}</button>
  </div>
</form>
